<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06081E"/>
      <stop offset="100%" stop-color="#0B0F2A"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7BA8FF"/>
      <stop offset="50%" stop-color="#4F8EFF"/>
      <stop offset="100%" stop-color="#B347FF"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <radialGradient id="bloom" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#4F8EFF" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#4F8EFF" stop-opacity="0.0"/>
    </radialGradient>
  </defs>

  <!-- Fondo redondeado (la mascarable safe area está dentro de un círculo de radio 205) -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bloom)"/>

  <!-- Glyph: tres líneas verticales como en un grafo (capas/memoria) + nodo orbital -->
  <g filter="url(#glow)">
    <!-- Tres trazos verticales tipo "barras de memoria" con altura escalonada -->
    <rect x="148" y="190" width="24" height="190" rx="12" fill="url(#glyph)"/>
    <rect x="244" y="150" width="24" height="232" rx="12" fill="url(#glyph)"/>
    <rect x="340" y="220" width="24" height="160" rx="12" fill="url(#glyph)"/>

    <!-- Nodo orbital (memoria capturada) -->
    <circle cx="256" cy="120" r="22" fill="#B347FF"/>
    <circle cx="256" cy="120" r="38" fill="none" stroke="#B347FF" stroke-width="3" stroke-opacity="0.45"/>
  </g>
</svg>
